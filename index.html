<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case 对比录屏模版</title>
<style>
  @font-face {
    font-family: "MiSans Demibold";
    src: url("fonts/MiSans-Demibold.woff2") format("woff2");
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #e9e9eb;
    overflow: hidden;
    font-family: "MiSans Demibold", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  }

  /* ---------- 16:9 画布，按窗口缩放 ---------- */
  #viewport {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    flex: 0 0 auto;
    background: #ffffff;
    transform-origin: center center;
    overflow: hidden;
  }

  /* ---------- 双栏布局 ---------- */
  .row {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .slot {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ---------- 标题（可编辑） ---------- */
  .title {
    font-family: "MiSans Demibold", -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    font-weight: 600;
    font-size: 52px;
    line-height: 1.3;
    color: #1d1d1f;
    letter-spacing: 0.5px;
    margin-bottom: 34px;
    min-width: 200px;
    text-align: center;
    outline: none;
    border-radius: 10px;
    padding: 6px 18px;
    transition: box-shadow .15s ease;
    cursor: text;
  }
  .title:hover  { box-shadow: 0 0 0 1.5px rgba(0,0,0,.12); }
  .title:focus  { box-shadow: 0 0 0 2px rgba(0,122,255,.55); }
  .title:empty::before {
    content: attr(data-placeholder);
    color: #b8b8be;
  }

  /* ---------- 视频卡片（叠层卡片效果） ---------- */
  .card-wrap {
    position: relative;
    width: 810px;
    height: 456px;
  }
  /* 背后第二层卡片，向右下偏移 */
  .card-wrap::before {
    content: "";
    position: absolute;
    top: 10px; left: 10px;
    width: 100%; height: 100%;
    background: #e4e4e7;
    border: 1.5px solid #d4d4d8;
    border-radius: 18px;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    background: #f4f4f5;
    border: 1.5px solid #e0e0e3;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 24px 48px -18px rgba(0,0,0,.18);
    cursor: pointer;
  }

  .card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    background: #000;
  }
  .card.has-video video { display: block; }
  .card.has-video .placeholder { display: none; }

  /* ---------- 占位提示 ---------- */
  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #9a9aa2;
    user-select: none;
    transition: background .15s ease;
  }
  .placeholder svg { width: 46px; height: 46px; opacity: .75; }
  .placeholder .ph-main { font-size: 22px; }
  .placeholder .ph-sub  { font-size: 15px; color: #b8b8be; }
  .card.dragover .placeholder { background: rgba(0,122,255,.06); color: #0a6cff; }
  .card.dragover { box-shadow: 0 0 0 3px rgba(0,122,255,.55), 0 24px 48px -18px rgba(0,0,0,.18); }

  /* ---------- 顶部工具栏（录屏时可隐藏） ---------- */
  #toolbar {
    position: fixed;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(28,28,30,.85);
    backdrop-filter: blur(12px);
    border-radius: 999px;
    color: #f5f5f7;
    font-size: 13px;
    transition: opacity .25s ease, transform .25s ease;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  }
  #toolbar.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(-12px); }
  #toolbar button {
    border: none;
    background: rgba(255,255,255,.14);
    color: #fff;
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background .15s ease;
  }
  #toolbar button:hover { background: rgba(255,255,255,.26); }
  #toolbar .sep { width: 1px; height: 16px; background: rgba(255,255,255,.25); }
  #toolbar .tip { color: rgba(255,255,255,.6); }
</style>
</head>
<body>

<div id="viewport">
  <div id="stage">
    <div class="row">
      <div class="slot">
        <div class="title" contenteditable="true" spellcheck="false" data-placeholder="输入标题">Claude Opus 4.8</div>
        <div class="card-wrap">
          <div class="card" data-slot="0">
            <video muted loop playsinline preload="auto"></video>
            <div class="placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 16V4m0 0L7 9m5-5 5 5"/>
                <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
              </svg>
              <div class="ph-main">点击或拖拽导入视频</div>
              <div class="ph-sub">支持 MP4 / MOV / WebM</div>
            </div>
          </div>
        </div>
      </div>

      <div class="slot">
        <div class="title" contenteditable="true" spellcheck="false" data-placeholder="输入标题">KIMI K3</div>
        <div class="card-wrap">
          <div class="card" data-slot="1">
            <video muted loop playsinline preload="auto"></video>
            <div class="placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 16V4m0 0L7 9m5-5 5 5"/>
                <path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
              </svg>
              <div class="ph-main">点击或拖拽导入视频</div>
              <div class="ph-sub">支持 MP4 / MOV / WebM</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toolbar">
  <button id="btn-play">⏸ 全部暂停</button>
  <button id="btn-restart">↺ 从头播放</button>
  <button id="btn-replace">⇪ 重新导入</button>
  <div class="sep"></div>
  <span class="tip">按 H 隐藏工具栏</span>
</div>

<script>
  const stage   = document.getElementById('stage');
  const toolbar = document.getElementById('toolbar');
  const cards   = [...document.querySelectorAll('.card')];
  const videos  = cards.map(c => c.querySelector('video'));

  /* ---------- 画布自适应缩放 ---------- */
  function fitStage() {
    const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    stage.style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', fitStage);
  fitStage();

  /* ---------- 视频导入 ---------- */
  function loadVideo(card, file) {
    if (!file || !file.type.startsWith('video/')) return;
    const video = card.querySelector('video');
    const oldUrl = video.src;
    video.src = URL.createObjectURL(file);
    video.play().catch(() => {});
    card.classList.add('has-video');
    if (oldUrl && oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
  }

  function pickFile(card) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'video/*';
    input.onchange = () => loadVideo(card, input.files[0]);
    input.click();
  }

  cards.forEach(card => {
    // 点击导入；已有视频时点击播放/暂停，双击重新导入
    card.addEventListener('click', () => {
      const video = card.querySelector('video');
      if (!card.classList.contains('has-video')) { pickFile(card); return; }
      video.paused ? video.play() : video.pause();
      syncPlayButton();
    });
    card.addEventListener('dblclick', () => pickFile(card));

    // 拖拽导入
    card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('dragover'); });
    card.addEventListener('dragleave', () => card.classList.remove('dragover'));
    card.addEventListener('drop', e => {
      e.preventDefault();
      card.classList.remove('dragover');
      loadVideo(card, e.dataTransfer.files[0]);
    });
  });

  /* ---------- 工具栏 ---------- */
  const btnPlay = document.getElementById('btn-play');
  function syncPlayButton() {
    const anyPlaying = videos.some(v => v.src && !v.paused);
    btnPlay.textContent = anyPlaying ? '⏸ 全部暂停' : '▶ 全部播放';
  }
  btnPlay.addEventListener('click', () => {
    const anyPlaying = videos.some(v => v.src && !v.paused);
    videos.forEach(v => { if (!v.src) return; anyPlaying ? v.pause() : v.play(); });
    syncPlayButton();
  });
  document.getElementById('btn-restart').addEventListener('click', () => {
    videos.forEach(v => { if (!v.src) return; v.currentTime = 0; v.play(); });
    syncPlayButton();
  });
  document.getElementById('btn-replace').addEventListener('click', () => {
    pickFile(cards.find(c => !c.classList.contains('has-video')) || cards[0]);
  });
  videos.forEach(v => { v.addEventListener('play', syncPlayButton); v.addEventListener('pause', syncPlayButton); });

  /* ---------- H 键隐藏工具栏，录屏更干净 ---------- */
  document.addEventListener('keydown', e => {
    if (e.target.isContentEditable) return;
    if (e.key === 'h' || e.key === 'H') toolbar.classList.toggle('hidden');
  });

  /* ---------- 标题编辑：回车确认 ---------- */
  document.querySelectorAll('.title').forEach(t => {
    t.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); t.blur(); }
    });
  });
</script>
</body>
</html>
